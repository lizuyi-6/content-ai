<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentAI - AI 驱动的多平台内容生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .loading-spinner {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script type="module">
    import React from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0';

    const { useState } = React;

    function App() {
      const [idea, setIdea] = useState('');
      const [platforms, setPlatforms] = useState(['twitter', 'linkedin', 'weibo', 'xiaohongshu']);
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const platformNames = {
        twitter: 'Twitter/X 🐦',
        linkedin: 'LinkedIn 💼',
        weibo: '微博 📱',
        xiaohongshu: '小红书 📕'
      };

      const togglePlatform = (p) => {
        setPlatforms(prev => 
          prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]
        );
      };

      const generate = async () => {
        if (!idea.trim()) {
          setError('请输入内容想法');
          return;
        }

        setLoading(true);
        setError('');
        setResults(null);

        try {
          const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idea, platforms })
          });

          const data = await res.json();
          
          if (data.success) {
            setResults(data.data);
          } else {
            setError(data.error || '生成失败');
          }
        } catch (err) {
          setError('网络错误，请检查服务器');
        } finally {
          setLoading(false);
        }
      };

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        alert('已复制到剪贴板！');
      };

      return (
        <div class="min-h-screen">
          {/* Header */}
          <header class="gradient-bg text-white py-12">
            <div class="container mx-auto px-4">
              <h1 class="text-4xl font-bold text-center mb-2">
                🚀 ContentAI
              </h1>
              <p class="text-center text-lg opacity-90">
                一个想法，自动生成多平台内容
              </p>
            </div>
          </header>

          {/* Main Content */}
          <main class="container mx-auto px-4 py-8 max-w-4xl">
            {/* Input Section */}
            <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
              <h2 class="text-xl font-semibold mb-4">💡 输入你的想法</h2>
              <textarea
                value={idea}
                onChange={(e) => setIdea(e.target.value)}
                placeholder="例如：我刚读完《原子习惯》，这本书教会我..."
                class="w-full h-32 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none"
              />
              
              {error && (
                <div class="mt-2 text-red-500 text-sm">{error}</div>
              )}

              {/* Platform Selection */}
              <div class="mt-4">
                <h3 class="text-sm font-medium text-gray-700 mb-2">选择平台</h3>
                <div class="flex flex-wrap gap-2">
                  {Object.entries(platformNames).map(([key, name]) => (
                    <button
                      key={key}
                      onClick={() => togglePlatform(key)}
                      class={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${
                        platforms.includes(key)
                          ? 'bg-purple-600 text-white'
                          : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                      }`}
                    >
                      {name}
                    </button>
                  ))}
                </div>
              </div>

              {/* Generate Button */}
              <button
                onClick={generate}
                disabled={loading || platforms.length === 0}
                class={`mt-6 w-full py-3 px-6 rounded-lg font-semibold text-white transition-colors ${
                  loading || platforms.length === 0
                    ? 'bg-gray-400 cursor-not-allowed'
                    : 'bg-purple-600 hover:bg-purple-700'
                }`}
              >
                {loading ? (
                  <span class="flex items-center justify-center">
                    <svg class="loading-spinner w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    正在生成...
                  </span>
                ) : (
                  '✨ 生成内容'
                )}
              </button>
            </div>

            {/* Results Section */}
            {results && (
              <div class="space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">📊 生成结果</h2>
                
                {Object.entries(results).map(([platform, data]) => (
                  <div key={platform} class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                      <h3 class="text-lg font-semibold text-gray-800">
                        {data.platform}
                      </h3>
                      <button
                        onClick={() => copyToClipboard(data.content)}
                        class="text-purple-600 hover:text-purple-800 text-sm font-medium"
                      >
                        📋 复制
                      </button>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                      <p class="text-gray-800 whitespace-pre-wrap">{data.content}</p>
                    </div>
                    <div class="mt-2 text-sm text-gray-500">
                      字数：{data.length}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </main>

          {/* Footer */}
          <footer class="bg-gray-800 text-white py-6 mt-12">
            <div class="container mx-auto px-4 text-center">
              <p class="text-sm opacity-75">
                Built with ❤️ by 李祖祎 | Powered by AI
              </p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
