<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentAI - AI 驱动的多平台内容生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .loading-spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script type="module">
    import React from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0';
    const { useState, useEffect } = React;

    function App() {
      const [currentPage, setCurrentPage] = useState('generate'); // generate, history, stats, settings
      const [user, setUser] = useState(null);
      const [apiKey, setApiKey] = useState(localStorage.getItem('contentai_apikey') || '');
      const [idea, setIdea] = useState('');
      const [platforms, setPlatforms] = useState(['twitter', 'linkedin', 'weibo', 'xiaohongshu']);
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [history, setHistory] = useState([]);
      const [stats, setStats] = useState(null);

      const platformNames = {
        twitter: 'Twitter/X 🐦',
        linkedin: 'LinkedIn 💼',
        weibo: '微博 📱',
        xiaohongshu: '小红书 📕'
      };

      // 检查登录状态
      useEffect(() => {
        if (apiKey) {
          fetch('/api/auth/me', { headers: { 'X-API-Key': apiKey } })
            .then(res => res.json())
            .then(data => {
              if (data.success) setUser(data.data);
            })
            .catch(() => {});
        }
      }, [apiKey]);

      // 登录
      const login = async (email, password) => {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('contentai_apikey', data.data.api_key);
          setApiKey(data.data.api_key);
          setUser(data.data);
        } else {
          throw new Error(data.error);
        }
      };

      // 注册
      const register = async (email, password, name) => {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('contentai_apikey', data.data.api_key);
          setApiKey(data.data.api_key);
          setUser(data.data);
        } else {
          throw new Error(data.error);
        }
      };

      // 生成内容
      const generate = async () => {
        if (!idea.trim()) { setError('请输入内容想法'); return; }
        if (!apiKey) { setError('请先登录'); return; }

        setLoading(true);
        setError('');
        setResults(null);

        try {
          const res = await fetch('/api/content/generate', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'X-API-Key': apiKey
            },
            body: JSON.stringify({ idea, platforms })
          });

          const data = await res.json();
          
          if (data.success) {
            setResults(data.data);
            setUser(prev => ({ ...prev, usage_count: data.usage.used }));
          } else {
            setError(data.error || '生成失败');
          }
        } catch (err) {
          setError('网络错误，请检查服务器');
        } finally {
          setLoading(false);
        }
      };

      // 加载历史
      const loadHistory = async () => {
        if (!apiKey) return;
        try {
          const res = await fetch('/api/content/history', {
            headers: { 'X-API-Key': apiKey }
          });
          const data = await res.json();
          if (data.success) setHistory(data.data);
        } catch (err) {}
      };

      useEffect(() => {
        if (currentPage === 'history') loadHistory();
      }, [currentPage]);

      // 加载统计
      const loadStats = async () => {
        if (!apiKey) return;
        try {
          const res = await fetch('/api/content/stats', {
            headers: { 'X-API-Key': apiKey }
          });
          const data = await res.json();
          if (data.success) setStats(data.data);
        } catch (err) {}
      };

      useEffect(() => {
        if (currentPage === 'stats') loadStats();
      }, [currentPage]);

      // 登出
      const logout = () => {
        localStorage.removeItem('contentai_apikey');
        setApiKey('');
        setUser(null);
        setCurrentPage('generate');
      };

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        alert('已复制到剪贴板！');
      };

      const togglePlatform = (p) => {
        setPlatforms(prev => prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]);
      };

      // 登录/注册页面
      if (!user) {
        return (
          <div class="min-h-screen gradient-bg flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
              <h1 class="text-3xl font-bold text-center mb-2">🚀 ContentAI</h1>
              <p class="text-center text-gray-600 mb-8">登录或注册以开始创作</p>
              <AuthForm onLogin={login} onRegister={register} />
            </div>
          </div>
        );
      }

      // 主界面
      return (
        <div class="min-h-screen">
          {/* Header */}
          <header class="gradient-bg text-white py-4">
            <div class="container mx-auto px-4 flex justify-between items-center">
              <h1 class="text-2xl font-bold">🚀 ContentAI</h1>
              <div class="flex items-center gap-4">
                <span class="text-sm opacity-90">
                  {user.name || user.email} | 
                  使用：{user.usage_count}/{user.usage_limit}
                </span>
                <button onClick={logout} class="text-sm hover:underline">退出</button>
              </div>
            </div>
          </header>

          {/* Navigation */}
          <nav class="bg-white shadow">
            <div class="container mx-auto px-4">
              <div class="flex gap-4">
                {[
                  { id: 'generate', label: '✨ 生成内容' },
                  { id: 'history', label: '📚 历史记录' },
                  { id: 'stats', label: '📊 使用统计' }
                ].map(item => (
                  <button
                    key={item.id}
                    onClick={() => setCurrentPage(item.id)}
                    class={`py-3 px-4 font-medium transition-colors ${
                      currentPage === item.id
                        ? 'text-purple-600 border-b-2 border-purple-600'
                        : 'text-gray-600 hover:text-gray-800'
                    }`}
                  >
                    {item.label}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* Main Content */}
          <main class="container mx-auto px-4 py-8 max-w-4xl">
            {currentPage === 'generate' && (
              <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-semibold mb-4">💡 输入你的想法</h2>
                <textarea
                  value={idea}
                  onChange={(e) => setIdea(e.target.value)}
                  placeholder="例如：我刚读完《原子习惯》，这本书教会我..."
                  class="w-full h-32 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 resize-none"
                />
                {error && <div class="mt-2 text-red-500 text-sm">{error}</div>}
                
                <div class="mt-4">
                  <h3 class="text-sm font-medium text-gray-700 mb-2">选择平台</h3>
                  <div class="flex flex-wrap gap-2">
                    {Object.entries(platformNames).map(([key, name]) => (
                      <button
                        key={key}
                        onClick={() => togglePlatform(key)}
                        class={`px-4 py-2 rounded-full text-sm font-medium ${
                          platforms.includes(key)
                            ? 'bg-purple-600 text-white'
                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                        }`}
                      >
                        {name}
                      </button>
                    ))}
                  </div>
                </div>

                <button
                  onClick={generate}
                  disabled={loading || platforms.length === 0}
                  class={`mt-6 w-full py-3 px-6 rounded-lg font-semibold text-white ${
                    loading || platforms.length === 0
                      ? 'bg-gray-400 cursor-not-allowed'
                      : 'bg-purple-600 hover:bg-purple-700'
                  }`}
                >
                  {loading ? '生成中...' : '✨ 生成内容'}
                </button>

                {results && (
                  <div class="mt-8 space-y-4">
                    <h3 class="text-lg font-bold">生成结果</h3>
                    {Object.entries(results).map(([platform, data]) => (
                      <div key={platform} class="border rounded-lg p-4">
                        <div class="flex justify-between mb-2">
                          <span class="font-semibold">{data.platform}</span>
                          <button onClick={() => copyToClipboard(data.content)} class="text-purple-600 text-sm">📋 复制</button>
                        </div>
                        <p class="text-gray-800 whitespace-pre-wrap bg-gray-50 p-3 rounded">{data.content}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {currentPage === 'history' && (
              <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-semibold mb-4">📚 历史记录</h2>
                {history.length === 0 ? (
                  <p class="text-gray-500">暂无历史记录</p>
                ) : (
                  <div class="space-y-4">
                    {history.map(item => (
                      <div key={item.id} class="border rounded-lg p-4">
                        <div class="flex justify-between text-sm text-gray-500 mb-2">
                          <span>{platformNames[item.platform]}</span>
                          <span>{new Date(item.created_at).toLocaleString()}</span>
                        </div>
                        <p class="text-gray-800">{item.content.substring(0, 200)}...</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {currentPage === 'stats' && stats && (
              <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-semibold mb-4">📊 使用统计</h2>
                <div class="grid grid-cols-2 gap-4">
                  <div class="bg-purple-50 p-4 rounded-lg">
                    <div class="text-3xl font-bold text-purple-600">{stats.total}</div>
                    <div class="text-gray-600">总生成次数</div>
                  </div>
                  <div class="bg-green-50 p-4 rounded-lg">
                    <div class="text-3xl font-bold text-green-600">{user.usage_limit - user.usage_count}</div>
                    <div class="text-gray-600">剩余次数</div>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    // 登录/注册表单组件
    function AuthForm({ onLogin, onRegister }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          if (isLogin) {
            await onLogin(email, password);
          } else {
            await onRegister(email, password, name);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <form onSubmit={handleSubmit} class="space-y-4">
          {!isLogin && (
            <input
              type="text"
              placeholder="昵称"
              value={name}
              onChange={(e) => setName(e.target.value)}
              class="w-full p-3 border rounded-lg"
            />
          )}
          <input
            type="email"
            placeholder="邮箱"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
            required
            class="w-full p-3 border rounded-lg"
          />
          <input
            type="password"
            placeholder="密码"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            required
            class="w-full p-3 border rounded-lg"
          />
          {error && <div class="text-red-500 text-sm">{error}</div>}
          <button
            type="submit"
            disabled={loading}
            class="w-full py-3 bg-purple-600 text-white rounded-lg font-semibold hover:bg-purple-700 disabled:bg-gray-400"
          >
            {loading ? '处理中...' : (isLogin ? '登录' : '注册')}
          </button>
          <p class="text-center text-sm text-gray-600">
            {isLogin ? '还没有账号？' : '已有账号？'}
            <button
              type="button"
              onClick={() => setIsLogin(!isLogin)}
              class="text-purple-600 hover:underline"
            >
              {isLogin ? '注册' : '登录'}
            </button>
          </p>
        </form>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
